version: "3"
services:
    uptime-kuma:
        image: louislam/uptime-kuma
        container_name: uptime-kuma
        restart: always
        ports:
            - ${UPTIME_KUMA_HOST_PORT}:${UPTIME_KUMA_CONT_PORT}
        volumes:
            - uptime-kuma:/app/data
            - /var/run/docker.sock:/var/run/docker.sock

volumes:
    uptime-kuma: