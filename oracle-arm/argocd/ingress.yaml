apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: argo-cd-argocd-server
      port:
        number: 443
  tls:
    - hosts:
        - argocd
