apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://serhanekicii.github.io/openclaw-helm
      chart: openclaw
      targetRevision: 1.4.0
      helm:
        valuesObject:
          app-template:
            configMode: overwrite
            controllers:
              main:
                containers:
                  main:
                    envFrom:
                      - secretRef:
                          name: openclaw-secrets
            configMaps:
              config:
                data:
                  openclaw.json: |
                    {
                      "gateway": {
                        "port": 18789,
                        "mode": "local",
                        "trustedProxies": ["10.0.0.0/8"],
                        "controlUi": {
                          "dangerouslyAllowHostHeaderOriginFallback": true
                        }
                      },
                      "browser": {
                        "enabled": true,
                        "defaultProfile": "default",
                        "profiles": {
                          "default": {
                            "cdpUrl": "http://localhost:9222",
                            "color": "#4285F4"
                          }
                        }
                      },
                      "agents": {
                        "defaults": {
                          "workspace": "/home/node/.openclaw/workspace",
                          "userTimezone": "UTC",
                          "timeoutSeconds": 600,
                          "maxConcurrent": 2
                        },
                        "list": [
                          {
                            "id": "main",
                            "default": true,
                            "model": {
                              "primary": "google/gemini-3.1-pro-preview"
                            },
                            "identity": {
                              "name": "Pro",
                              "emoji": "🧠"
                            }
                          },
                          {
                            "id": "fast",
                            "model": {
                              "primary": "google/gemini-3-flash-preview"
                            },
                            "identity": {
                              "name": "Flash",
                              "emoji": "⚡"
                            }
                          }
                        ]
                      },
                      "session": {
                        "scope": "per-sender",
                        "store": "/home/node/.openclaw/sessions",
                        "reset": {
                          "mode": "idle",
                          "idleMinutes": 60
                        }
                      },
                      "logging": {
                        "level": "info",
                        "consoleLevel": "info",
                        "consoleStyle": "compact",
                        "redactSensitive": "tools"
                      },
                      "tools": {
                        "profile": "full",
                        "web": {
                          "search": { "enabled": false },
                          "fetch": { "enabled": true }
                        }
                      },
                      "channels": {
                        "telegram": {
                          "enabled": true,
                          "botToken": "${TELEGRAM_BOT_TOKEN}",
                          "dmPolicy": "pairing"
                        }
                      }
                    }
            ingress:
              main:
                enabled: true
                className: tailscale
                defaultBackend:
                  service:
                    name: openclaw
                    port:
                      number: 18789
                tls:
                  - hosts:
                      - openclaw
    - repoURL: https://github.com/belgio99/homelab.git
      targetRevision: main
      path: oracle-arm/openclaw
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
