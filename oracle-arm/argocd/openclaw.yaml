apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://serhanekicii.github.io/openclaw-helm
      chart: openclaw
      targetRevision: 1.5.4
      helm:
        valuesObject:
          app-template:
            configMode: overwrite
            controllers:
              main:
                initContainers:
                  install-tools:
                    image: alpine:3.23
                    command:
                      - sh
                      - -c
                      - |
                        apk add --no-cache curl tar gzip &&
                        # Install gh CLI
                        GH_VERSION=2.67.0
                        curl -sL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_arm64.tar.gz" | tar xz -C /tmp &&
                        cp /tmp/gh_${GH_VERSION}_linux_arm64/bin/gh /extra-tools/ &&
                        # Install kubectl
                        curl -sL "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl" -o /extra-tools/kubectl &&
                        chmod +x /extra-tools/gh /extra-tools/kubectl &&
                        echo "Tools installed:" && ls -la /extra-tools/
                    volumeMounts:
                      - name: extra-tools
                        mountPath: /extra-tools
                containers:
                  main:
                    env:
                      - name: PATH
                        value: "/extra-tools:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                    envFrom:
                      - secretRef:
                          name: openclaw-secrets
                    volumeMounts:
                      - name: extra-tools
                        mountPath: /extra-tools
            persistence:
              extra-tools:
                type: emptyDir
            configMaps:
              config:
                data:
                  openclaw.json: |
                    {
                      "gateway": {
                        "port": 18789,
                        "mode": "local",
                        "trustedProxies": ["10.0.0.0/8"],
                        "controlUi": {
                          "dangerouslyAllowHostHeaderOriginFallback": true
                        }
                      },
                      "browser": {
                        "enabled": true,
                        "defaultProfile": "default",
                        "profiles": {
                          "default": {
                            "cdpUrl": "http://localhost:9222",
                            "color": "#4285F4"
                          }
                        }
                      },
                      "agents": {
                        "defaults": {
                          "workspace": "/home/node/.openclaw/workspace",
                          "model": "google/gemini-3.1-pro-preview",
                          "userTimezone": "UTC",
                          "timeoutSeconds": 600,
                          "maxConcurrent": 2
                        }
                      },
                      "session": {
                        "scope": "per-sender",
                        "store": "/home/node/.openclaw/sessions",
                        "reset": {
                          "mode": "idle",
                          "idleMinutes": 60
                        }
                      },
                      "logging": {
                        "level": "info",
                        "consoleLevel": "info",
                        "consoleStyle": "compact",
                        "redactSensitive": "tools"
                      },
                      "tools": {
                        "profile": "full",
                        "web": {
                          "search": { "enabled": true },
                          "fetch": { "enabled": true }
                        }
                      },
                      "channels": {
                        "telegram": {
                          "enabled": true,
                          "botToken": "${TELEGRAM_BOT_TOKEN}",
                          "dmPolicy": "pairing"
                        }
                      }
                    }
            ingress:
              main:
                enabled: true
                className: tailscale
                defaultBackend:
                  service:
                    name: openclaw
                    port:
                      number: 18789
                tls:
                  - hosts:
                      - openclaw
    - repoURL: https://github.com/belgio99/homelab.git
      targetRevision: main
      path: oracle-arm/openclaw
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
