apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://serhanekicii.github.io/openclaw-helm
      chart: openclaw
      targetRevision: 1.5.30
      helm:
        valuesObject:
          app-template:
            configMode: overwrite
            controllers:
              main:
                serviceAccount:
                  name: openclaw-ai-sa
                pod:
                  dnsConfig:
                    options:
                      - name: no-aaaa
                initContainers:
                  install-tools:
                    image:
                      repository: alpine
                      tag: "3.23"
                    command:
                      - sh
                      - -c
                      - |
                        apk add --no-cache curl tar gzip &&
                        # Install gh CLI
                        GH_VERSION=2.92.0
                        curl -sL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_arm64.tar.gz" | tar xz -C /tmp &&
                        cp /tmp/gh_${GH_VERSION}_linux_arm64/bin/gh /extra-tools/ &&
                        # Install kubectl
                        curl -sL "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl" -o /extra-tools/kubectl &&
                        chmod +x /extra-tools/gh /extra-tools/kubectl &&
                        echo "Tools installed:" && ls -la /extra-tools/
                containers:
                  main:
                    env:
                      PATH: "/extra-tools:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                      NODE_OPTIONS: "--dns-result-order=ipv4first"
                    envFrom:
                      - secretRef:
                          name: openclaw-secrets
                    probes:
                      startup:
                        enabled: true
                        custom: true
                        spec:
                          failureThreshold: 60
                          initialDelaySeconds: 10
                          periodSeconds: 5
                          timeoutSeconds: 5
                          tcpSocket:
                            port: 18789
            persistence:
              extra-tools:
                type: emptyDir
                advancedMounts:
                  main:
                    main:
                      - path: /extra-tools
                    install-tools:
                      - path: /extra-tools
            configMaps:
              config:
                data:
                  openclaw.json: |
                    {
                      "meta": {
                        "lastTouchedVersion": "0.0.0",
                        "lastTouchedAt": "1970-01-01T00:00:00.000Z"
                      },
                      "gateway": {
                        "port": 18789,
                        "mode": "local",
                        "bind": "lan",
                        "trustedProxies": ["10.0.0.0/8"],
                        "controlUi": {
                          "dangerouslyAllowHostHeaderOriginFallback": true,
                          "dangerouslyDisableDeviceAuth": true,
                          "allowInsecureAuth": true
                        }
                      },
                      "agents": {
                        "defaults": {
                          "workspace": "/home/node/.openclaw/workspace",
                          "model": {
                            "primary": "openai/gpt-5.5"
                          },
                          "agentRuntime": {
                            "id": "codex",
                            "fallback": "none"
                          },
                          "userTimezone": "Europe/Rome",
                          "timeoutSeconds": 600,
                          "maxConcurrent": 2,
                          "models": {
                            "openai/gpt-5.5": { "alias": "gpt" },
                            "openai/gpt-5.4-mini": { "alias": "gpt-mini" },
                            "google/gemini-3.1-pro-preview": { "alias": "gemini" },
                            "google/gemini-3.1-flash-lite-preview": { "alias": "gemini-flash-lite" },
                            "anthropic/claude-opus-4-7": { "alias": "opus" }
                          }
                        }
                      },
                      "channels": {
                        "telegram": {
                          "enabled": true,
                          "botToken": "${TELEGRAM_BOT_TOKEN}",
                          "dmPolicy": "pairing"
                        }
                      },
                      "plugins": {
                        "entries": {
                          "codex": {
                            "enabled": true,
                            "config": {
                              "appServer": {
                                "sandbox": "danger-full-access",
                                "approvalPolicy": "never"
                              }
                            }
                          }
                        }
                      }
                    }
            ingress:
              main:
                enabled: true
                className: tailscale
                defaultBackend:
                  service:
                    name: openclaw
                    port:
                      number: 18789
                tls:
                  - hosts:
                      - openclaw
    - repoURL: https://github.com/belgio99/homelab.git
      targetRevision: main
      path: oracle-arm/openclaw
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
