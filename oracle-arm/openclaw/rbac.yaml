apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-ai-sa
  namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-readonly-role
rules:
- apiGroups: ["", "apps", "batch"]
  resources: ["pods", "pods/log", "deployments", "services", "events", "nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-readonly-binding
subjects:
- kind: ServiceAccount
  name: openclaw-ai-sa
  namespace: openclaw
roleRef:
  kind: ClusterRole
  name: ai-readonly-role
  apiGroup: rbac.authorization.k8s.io
