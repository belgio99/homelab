apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress-sologemma
  labels:
    app: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:latest
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: "10.0.0.250:3306"
            - name: WORDPRESS_DB_USER
              value: "wordpress_sologemma"
            - name: WORDPRESS_DB_NAME
              value: "wordpress_sologemma"
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-db-credentials
                  key: password
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: wordpress-data
