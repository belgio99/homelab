apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wordpress-db-password
  namespace: wordpress-sologemma
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: wordpress-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: "db-heatwave-user-wordpress_sologemma-password"
